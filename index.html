<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { 
  background: #0a0a0a; color: #fafafa;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px; line-height: 1.4; overflow-x: hidden;
  padding-bottom: env(safe-area-inset-bottom);
}
.app { max-width: 600px; margin: 0 auto; min-height: 100vh; }
.header {
  position: sticky; top: 0; z-index: 10;
  background: #0a0a0a; padding: 12px 16px;
  border-bottom: 1px solid #1a1a1a;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.icon-btn {
  background: none; border: none; color: #fafafa; cursor: pointer;
  padding: 8px; font-size: 20px; border-radius: 8px;
}
.icon-btn:active { background: #1a1a1a; }
.content { padding: 12px 16px; }

/* Search */
.search-input {
  width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a;
  color: #fafafa; padding: 14px 16px; border-radius: 12px;
  font-size: 16px; outline: none;
}
.search-input:focus { border-color: #6c5ce7; }

/* Track card */
.track-card {
  background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 10px; padding: 10px 12px; margin-bottom: 6px;
  cursor: pointer; transition: background 0.15s;
}
.track-card:active { background: #232323; }
.track-title { font-weight: 600; font-size: 14px; line-height: 1.3; margin-bottom: 2px; }
.track-artist { color: #aaa; font-size: 12px; margin-bottom: 6px; }
.track-meta {
  display: flex; gap: 8px; font-size: 11px; color: #888;
  align-items: center; flex-wrap: wrap;
}
.meta-pill {
  background: #2a2a2a; padding: 2px 7px; border-radius: 10px;
  font-weight: 600; color: #ddd;
}
.meta-pill.bpm { background: #2a2438; color: #b8a8ff; }
.meta-pill.key { background: #1f3528; color: #6ee7a8; }
.meta-pill.energy { background: #3a2418; color: #ffb088; }
.meta-pill.cam { background: #1a2a3a; color: #88c8ff; }

/* Now playing */
.np-card {
  background: linear-gradient(135deg, #1a1a1a, #232036);
  border: 1px solid #6c5ce7; border-radius: 14px;
  padding: 16px; margin-bottom: 16px;
}
.np-label {
  font-size: 10px; color: #6c5ce7; letter-spacing: 1.5px;
  font-weight: 700; margin-bottom: 4px;
}
.np-title { font-size: 16px; font-weight: 700; line-height: 1.3; margin-bottom: 4px; }
.np-artist { color: #aaa; font-size: 13px; margin-bottom: 10px; }

/* Intentions */
.intentions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px;
}
.intention-btn {
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #fafafa;
  padding: 14px 8px; border-radius: 12px; font-size: 13px;
  cursor: pointer; font-weight: 600; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.intention-btn .emoji { font-size: 22px; line-height: 1; }
.intention-btn:active { background: #232323; }
.intention-btn.active { background: #2a2138; border-color: #6c5ce7; color: #b8a8ff; }

/* Delta indicators */
.delta { font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 700; }
.delta.up { background: #1f3528; color: #6ee7a8; }
.delta.down { background: #3a2025; color: #ff8896; }
.delta.eq { background: #2a2a2a; color: #aaa; }
.delta.warn { background: #3a3020; color: #ffd888; }

/* Transition quality */
.trans-badge {
  font-size: 10px; padding: 2px 6px; border-radius: 4px;
  font-weight: 700; letter-spacing: 0.3px;
}
.trans-badge.perfect { background: #1f3528; color: #6ee7a8; }
.trans-badge.good { background: #1a2a3a; color: #88c8ff; }

/* Empty */
.empty {
  text-align: center; padding: 40px 20px; color: #666; font-size: 14px;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: flex-end; z-index: 100;
}
.modal {
  background: #1a1a1a; border-top-left-radius: 20px; border-top-right-radius: 20px;
  width: 100%; max-width: 600px; margin: 0 auto;
  padding: 20px 16px 32px; max-height: 80vh; overflow-y: auto;
}
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid #2a2a2a;
}
.stepper { display: flex; gap: 8px; align-items: center; }
.stepper button {
  background: #2a2a2a; color: #fafafa; border: none;
  width: 32px; height: 32px; border-radius: 8px; font-size: 18px; cursor: pointer;
}
.stepper span { min-width: 30px; text-align: center; font-weight: 600; }

.section-label {
  font-size: 11px; color: #888; letter-spacing: 1px; font-weight: 600;
  text-transform: uppercase; margin: 16px 0 8px;
}

/* Section results headline */
.results-hdr {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.results-count { font-size: 12px; color: #888; }
</style>
</head>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// --- Camelot helpers ---
const camSplit = c => c ? [parseInt(c.slice(0,-1)), c.slice(-1)] : [null, null];
const transitionsValides = key => {
  const [n,l] = camSplit(key);
  if (!n) return new Set();
  const other = l === 'A' ? 'B' : 'A';
  return new Set([key, `${n}${other}`, `${n===1?12:n-1}${l}`, `${n===12?1:n+1}${l}`]);
};
const transType = (c1, c2) => {
  if (!c1 || !c2) return '?';
  if (c1 === c2) return '=';
  const [n1,l1] = camSplit(c1), [n2,l2] = camSplit(c2);
  if (n1===n2 && l1!==l2) return 'rel';
  const diff = ((n2-n1)%12 + 12) % 12;
  if (diff === 1) return '+1';
  if (diff === 11) return '-1';
  return '⚠';
};

// --- Suggestion engine ---
function suggest(current, intention, allTracks, maxResults) {
  if (!current) return [];
  const valid = transitionsValides(current.c);
  
  // Critères par intention
  const criteria = {
    boost: { dBpmMin: 1, dBpmMax: 3, dEMin: 1, dEMax: 2.5, sameGenreBonus: 0 },
    break: { dBpmMin: -1, dBpmMax: 1, dEMin: -3, dEMax: -0.5, sameGenreBonus: 0, durBonus: true, calmGenreBonus: true },
    style: { dBpmMin: -2, dBpmMax: 2, dEMin: -1.5, dEMax: 1.5, diffGenreBonus: true },
    continue: { dBpmMin: 0, dBpmMax: 2, dEMin: -0.5, dEMax: 0.7, sameGenreBonus: true }
  }[intention];
  
  // Premier genre normalisé pour comparaison
  const norm = s => (s||'').toLowerCase().split(/[\/&,]/)[0].trim();
  const curGenre = norm(current.g);
  
  const candidates = allTracks
    .filter(t => t.i !== current.i)
    .filter(t => valid.has(t.c))
    .filter(t => {
      const dBpm = t.b - current.b;
      const dE = t.e - current.e;
      return dBpm >= criteria.dBpmMin && dBpm <= criteria.dBpmMax 
        && dE >= criteria.dEMin && dE <= criteria.dEMax;
    });
  
  // Scoring composite
  const scored = candidates.map(t => {
    const dBpm = t.b - current.b;
    const dE = t.e - current.e;
    const tGenre = norm(t.g);
    
    // 1. Pertinence : proximité du centre des critères idéaux
    const bpmIdeal = (criteria.dBpmMin + criteria.dBpmMax) / 2;
    const eIdeal = (criteria.dEMin + criteria.dEMax) / 2;
    const pertinence = 100 - Math.abs(dBpm - bpmIdeal)*8 - Math.abs(dE - eIdeal)*10;
    
    // 2. Bonus diversité (artiste/label différent)
    let divBonus = 0;
    if (t.a && current.a && t.a !== current.a) divBonus += 5;
    if (t.l && current.l && t.l !== current.l) divBonus += 3;
    
    // 3. Bonus popularité (Play Count + Note)
    const popBonus = Math.min(10, (t.p||0) * 1.5 + (t.n||0) * 2);
    
    // 4. Bonus contextuel par intention
    let ctxBonus = 0;
    if (criteria.sameGenreBonus && tGenre === curGenre) ctxBonus += 8;
    if (criteria.diffGenreBonus && tGenre !== curGenre && tGenre) ctxBonus += 12;
    if (criteria.calmGenreBonus && /organic|downtempo|electronica|melodic/.test(tGenre)) ctxBonus += 6;
    if (criteria.durBonus && t.d > 420) ctxBonus += 5;
    
    // 5. Bonus transition harmonique parfaite
    const tType = transType(current.c, t.c);
    let transBonus = 0;
    if (tType === '=' || tType === 'rel') transBonus = 5;
    
    return {
      ...t,
      _score: pertinence + divBonus + popBonus + ctxBonus + transBonus,
      _dBpm: dBpm,
      _dE: dE,
      _trans: tType
    };
  });
  
  scored.sort((a,b) => b._score - a._score);
  return scored.slice(0, maxResults);
}

// --- Components ---
function MetaPills({ track }) {
  return (
    <div className="track-meta">
      <span className="meta-pill bpm">{track.b.toFixed(0)} BPM</span>
      <span className="meta-pill key">{track.k}</span>
      <span className="meta-pill cam">{track.c}</span>
      <span className="meta-pill energy">E {track.e.toFixed(1)}</span>
      <span style={{color:'#666'}}>{track.g}</span>
    </div>
  );
}

function TrackCard({ track, onClick }) {
  return (
    <div className="track-card" onClick={onClick}>
      <div className="track-title">{track.t}</div>
      {track.a && <div className="track-artist">{track.a}</div>}
      <MetaPills track={track} />
    </div>
  );
}

function SuggestionCard({ s, onClick }) {
  const dBpm = s._dBpm;
  const dE = s._dE;
  const dBpmStr = dBpm > 0 ? `+${dBpm.toFixed(0)}` : dBpm.toFixed(0);
  const dEStr = dE > 0 ? `+${dE.toFixed(1)}` : dE.toFixed(1);
  const dBpmCls = dBpm > 0 ? 'up' : dBpm < 0 ? 'down' : 'eq';
  const dECls = dE > 0.3 ? 'up' : dE < -0.3 ? 'down' : 'eq';
  const transCls = (s._trans === '=' || s._trans === 'rel') ? 'perfect' : 'good';
  
  return (
    <div className="track-card" onClick={onClick}>
      <div className="track-title">{s.t}</div>
      {s.a && <div className="track-artist">{s.a}</div>}
      <div className="track-meta">
        <span className="meta-pill bpm">{s.b.toFixed(0)}</span>
        <span className={`delta ${dBpmCls}`}>{dBpmStr}</span>
        <span className="meta-pill key">{s.k}</span>
        <span className={`trans-badge ${transCls}`}>{s._trans}</span>
        <span className="meta-pill energy">E {s.e.toFixed(1)}</span>
        <span className={`delta ${dECls}`}>{dEStr}</span>
        <span style={{color:'#666', fontSize:'10px'}}>
          {Math.floor(s.d/60)}:{(s.d%60).toString().padStart(2,'0')}
        </span>
        {s.p > 0 && <span style={{color:'#888', fontSize:'10px'}}>▶{s.p}</span>}
        {s.n > 0 && <span style={{color:'#888', fontSize:'10px'}}>{'★'.repeat(s.n)}</span>}
      </div>
    </div>
  );
}

function App() {
  const [query, setQuery] = useState('');
  const [current, setCurrent] = useState(null);
  const [intention, setIntention] = useState('continue');
  const [showSettings, setShowSettings] = useState(false);
  const [maxResults, setMaxResults] = useState(8);
  
  const searchRef = useRef(null);
  
  useEffect(() => {
    const saved = localStorage.getItem('nt_maxResults');
    if (saved) setMaxResults(parseInt(saved));
  }, []);
  
  const setMax = v => {
    setMaxResults(v);
    localStorage.setItem('nt_maxResults', v.toString());
  };
  
  // Recherche
  const searchResults = useMemo(() => {
    if (!query || query.length < 2) return [];
    const q = query.toLowerCase();
    return window.TRACKS
      .filter(t => 
        t.t.toLowerCase().includes(q) || 
        (t.a && t.a.toLowerCase().includes(q))
      )
      .sort((a,b) => {
        // Prioriser les matches au début
        const aStart = a.t.toLowerCase().startsWith(q) || (a.a && a.a.toLowerCase().startsWith(q));
        const bStart = b.t.toLowerCase().startsWith(q) || (b.a && b.a.toLowerCase().startsWith(q));
        if (aStart && !bStart) return -1;
        if (!aStart && bStart) return 1;
        return (b.p + b.n) - (a.p + a.n);
      })
      .slice(0, 8);
  }, [query]);
  
  const suggestions = useMemo(
    () => current ? suggest(current, intention, window.TRACKS, maxResults) : [],
    [current, intention, maxResults]
  );
  
  const intentions = [
    { key: 'boost', emoji: '⚡', label: 'Booster' },
    { key: 'break', emoji: '🌊', label: 'Break' },
    { key: 'style', emoji: '🔀', label: 'Style' },
    { key: 'continue', emoji: '➡️', label: 'Continuer' }
  ];
  
  return (
    <div className="app">
      <div className="header">
        <h1>🎧 Next Track</h1>
        <button className="icon-btn" onClick={() => setShowSettings(true)} aria-label="Paramètres">⚙️</button>
      </div>
      <div className="content">
        {!current ? (
          <>
            <input 
              ref={searchRef}
              className="search-input"
              type="search"
              placeholder="Rechercher une track..."
              value={query}
              onChange={e => setQuery(e.target.value)}
              autoFocus
            />
            {searchResults.length > 0 ? (
              <>
                <div className="section-label">Résultats ({searchResults.length})</div>
                {searchResults.map(t => 
                  <TrackCard key={t.i} track={t} onClick={() => { setCurrent(t); setQuery(''); }} />
                )}
              </>
            ) : query.length >= 2 ? (
              <div className="empty">
                <div className="empty-icon">🔍</div>
                Aucune track trouvée
              </div>
            ) : (
              <div className="empty">
                <div className="empty-icon">🎵</div>
                <div>Tape les premières lettres d'une track ou d'un artiste</div>
                <div style={{marginTop:8, fontSize:12, color:'#555'}}>
                  {window.TRACKS.length} tracks en bibliothèque
                </div>
              </div>
            )}
          </>
        ) : (
          <>
            <div className="np-card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:8}}>
                <div style={{flex:1}}>
                  <div className="np-label">▶️ EN COURS</div>
                  <div className="np-title">{current.t}</div>
                  {current.a && <div className="np-artist">{current.a}</div>}
                  <MetaPills track={current} />
                </div>
                <button className="icon-btn" onClick={() => setCurrent(null)} aria-label="Retour">✕</button>
              </div>
            </div>
            
            <div className="intentions">
              {intentions.map(i => (
                <button 
                  key={i.key}
                  className={`intention-btn ${intention === i.key ? 'active' : ''}`}
                  onClick={() => setIntention(i.key)}
                >
                  <span className="emoji">{i.emoji}</span>
                  <span>{i.label}</span>
                </button>
              ))}
            </div>
            
            <div className="results-hdr">
              <div className="section-label" style={{margin:0}}>
                Suggestions {intentions.find(i => i.key === intention)?.label}
              </div>
              <div className="results-count">{suggestions.length} résultats</div>
            </div>
            
            {suggestions.length > 0 ? (
              suggestions.map(s => 
                <SuggestionCard 
                  key={s.i} 
                  s={s} 
                  onClick={() => setCurrent(s)}
                />
              )
            ) : (
              <div className="empty">
                <div className="empty-icon">🤷</div>
                Aucune suggestion dans ces critères. Essaie une autre intention.
              </div>
            )}
          </>
        )}
      </div>
      
      {showSettings && (
        <div className="modal-overlay" onClick={() => setShowSettings(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h2>⚙️ Paramètres</h2>
            <div className="modal-row">
              <span>Nombre de suggestions</span>
              <div className="stepper">
                <button onClick={() => setMax(Math.max(3, maxResults-1))}>−</button>
                <span>{maxResults}</span>
                <button onClick={() => setMax(Math.min(20, maxResults+1))}>+</button>
              </div>
            </div>
            <div className="modal-row">
              <span style={{color:'#888'}}>Bibliothèque</span>
              <span>{window.TRACKS.length} tracks</span>
            </div>
            <div className="modal-row" style={{borderBottom:'none'}}>
              <span style={{color:'#888'}}>Version</span>
              <span style={{color:'#888'}}>v1.0</span>
            </div>
            <button 
              style={{width:'100%',marginTop:16,padding:14,background:'#6c5ce7',color:'#fff',border:'none',borderRadius:12,fontSize:15,fontWeight:600,cursor:'pointer'}}
              onClick={() => setShowSettings(false)}
            >
              Fermer
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Service worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
